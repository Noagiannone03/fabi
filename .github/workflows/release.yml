# GitHub Actions workflow — release multi-OS de Fabi.
#
# Déclenchement : push d'un tag `v*` (ex: `git tag v0.1.0 && git push --tags`)
#
# Ce workflow démarre 6 machines virtuelles GitHub (une par OS/arch),
# chacune produit son tarball `fabi-<os>-<arch>-<accel>.tar.zst` via
# scripts/release-build.sh, et toutes les machines uploadent sur la
# même GitHub Release. Total ~30 min d'exécution en parallèle.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # Permet de lancer manuellement depuis l'interface GitHub Actions
    # (utile pour tester avant un vrai release)

permissions:
  contents: write   # nécessaire pour créer la GitHub Release

jobs:
  build:
    name: Build ${{ matrix.platform.tag }}
    strategy:
      # On ne fail pas tout si une plateforme casse — on récupère les autres
      fail-fast: false
      matrix:
        platform:
          # Linux x64 CPU (le plus commun, sert aussi pour les serveurs sans GPU)
          - tag: linux-x64-cpu
            os: ubuntu-latest
            bun_target: bun-linux-x64
            pbs_arch: x86_64-unknown-linux-gnu
            accel: cpu

          # Linux x64 CUDA (NVIDIA — desktops gamers, datacenters)
          - tag: linux-x64-cuda
            os: ubuntu-latest
            bun_target: bun-linux-x64
            pbs_arch: x86_64-unknown-linux-gnu
            accel: cuda

          # Linux ARM64 (Raspberry Pi 4+, AWS Graviton, Ampere)
          - tag: linux-arm64-cpu
            os: ubuntu-24.04-arm
            bun_target: bun-linux-arm64
            pbs_arch: aarch64-unknown-linux-gnu
            accel: cpu

          # macOS Apple Silicon (M1+) avec MLX (le bon use case pour Mac)
          - tag: darwin-arm64-mlx
            os: macos-14
            bun_target: bun-darwin-arm64
            pbs_arch: aarch64-apple-darwin
            accel: mlx

          # macOS Intel (avant 2020, en voie d'extinction mais encore utilisé)
          - tag: darwin-x64-cpu
            os: macos-15-intel
            bun_target: bun-darwin-x64
            pbs_arch: x86_64-apple-darwin
            accel: cpu

          # Windows x64 NVIDIA — NATIF, sans WSL. Parallax y contribue via le wheel
          # vLLM-Windows (SystemPanic, cu124 / cp312) + Parallax core "mlx-free".
          # Validé bout-en-bout sur GPU : un worker mlx-absent a chargé Qwen3-1.7B et
          # servi dans le vrai swarm (cf. branche swarm-engine production).
          - tag: windows-x64-cuda
            os: windows-latest
            bun_target: bun-windows-x64
            pbs_arch: x86_64-pc-windows-msvc
            accel: cuda

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout meta-projet
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup outils (zstd)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y zstd
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install zstd
          fi
        shell: bash

      - name: Clone des forks (fabi-cli + swarm-engine)
        env:
          # On clone depuis NOS forks (qui contiennent les modifs Fabi),
          # pas depuis upstream. Configurable via les variables ci-dessous.
          OPENCODE_FORK_REMOTE: ${{ vars.OPENCODE_FORK_REMOTE || 'https://github.com/Noagiannone03/fabi-cli.git' }}
          PARALLAX_FORK_REMOTE: ${{ vars.PARALLAX_FORK_REMOTE || 'https://github.com/Noagiannone03/swarm-engine.git' }}
          OPENCODE_UPSTREAM: https://github.com/sst/opencode.git
          PARALLAX_UPSTREAM: https://github.com/GradientHQ/parallax.git
        run: |
          set -a
          source runtime-lock.env
          set +a
          chmod +x scripts/setup.sh
          ./scripts/setup.sh
        shell: bash

      - name: Build tarball
        env:
          FABI_VERSION: ${{ github.ref_name }}
          # GitHub Releases refuse les assets >2 GB. Le runtime Linux-CUDA complet
          # dépasse cette limite → son tarball n'embarque que Fabi (Parallax installé
          # au 1er lancement). Sur Windows on bundle le runtime (wheel vLLM-Windows +
          # Parallax core mlx-free) pour une app autonome. Si l'artefact Windows
          # dépasse 2 GB, passer ce flag à '1' pour windows-latest aussi.
          FABI_SKIP_PARALLAX: ${{ (matrix.platform.accel == 'cuda' && matrix.platform.os != 'windows-latest') && '1' || '' }}
        run: |
          chmod +x scripts/release-build.sh
          ./scripts/release-build.sh \
            ${{ matrix.platform.bun_target }} \
            ${{ matrix.platform.pbs_arch }} \
            ${{ matrix.platform.accel }}
        shell: bash

      - name: Upload artifact (debug si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform.tag }}
          path: dist/

      - name: Upload sur la Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Glob : prend le tarball + .sha256 (petites plateformes) OU les .part??
          # + .parts + .sha256 (plateformes splittées >2 Gio). Voir release-build.sh.
          files: |
            dist/fabi-${{ matrix.platform.tag }}.tar.zst*
          # Si le tag est une pre-release (ex: v0.1.0-rc1) → marqué pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}
          # On ne publie pas tout de suite, on assemble la release au fil des jobs
          draft: false
          fail_on_unmatched_files: true

  publish-installer:
    name: Mise à jour install.sh dans la release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Attacher install.sh / install.ps1 / install.cmd à la release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1
            install.cmd
          fail_on_unmatched_files: false
